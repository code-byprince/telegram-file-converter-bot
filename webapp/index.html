<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>File Converter Bot</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--tg-theme-bg-color, #0f0f0f);
    color: var(--tg-theme-text-color, #ffffff);
    padding: 16px;
    padding-bottom: 40px;
  }
  h1 {
    font-size: 22px;
    margin-bottom: 4px;
  }
  .subtitle {
    color: var(--tg-theme-hint-color, #8a8a8a);
    font-size: 14px;
    margin-bottom: 20px;
  }
  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 18px;
    overflow-x: auto;
    padding-bottom: 4px;
  }
  .tab {
    flex-shrink: 0;
    padding: 8px 16px;
    border-radius: 20px;
    background: var(--tg-theme-secondary-bg-color, #1c1c1e);
    color: var(--tg-theme-text-color, #fff);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: none;
  }
  .tab.active {
    background: var(--tg-theme-button-color, #2ea6ff);
    color: var(--tg-theme-button-text-color, #fff);
  }
  .panel { display: none; flex-direction: column; gap: 10px; }
  .panel.active { display: flex; }
  .btn {
    width: 100%;
    text-align: left;
    padding: 14px 16px;
    border-radius: 12px;
    background: var(--tg-theme-secondary-bg-color, #1c1c1e);
    color: var(--tg-theme-text-color, #fff);
    border: none;
    font-size: 15px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .btn:active { opacity: 0.7; }
  .emoji { font-size: 18px; }
</style>
</head>
<body>

<h1>🤖 File Converter Bot</h1>
<div class="subtitle">Category choose karo, phir bot me file bhejo</div>

<div class="tabs">
  <button class="tab active" data-tab="image">🖼️ Image</button>
  <button class="tab" data-tab="document">📄 Document</button>
  <button class="tab" data-tab="excel">📊 Excel</button>
  <button class="tab" data-tab="video">🎬 Video</button>
</div>

<div class="panel active" id="panel-image">
  <button class="btn" data-action="action_img_to_jpg"><span class="emoji">🖼️</span> Image → JPG</button>
  <button class="btn" data-action="action_img_to_png"><span class="emoji">🖼️</span> Image → PNG</button>
  <button class="btn" data-action="action_img_to_webp"><span class="emoji">🖼️</span> Image → WEBP</button>
  <button class="btn" data-action="action_img_compress"><span class="emoji">📉</span> Image Compress</button>
  <button class="btn" data-action="action_img_resize"><span class="emoji">📐</span> Image Resize</button>
  <button class="btn" data-action="action_img_to_pdf"><span class="emoji">📎</span> Images → PDF</button>
  <button class="btn" data-action="action_pdf_to_img"><span class="emoji">📎</span> PDF → Images</button>
</div>

<div class="panel" id="panel-document">
  <button class="btn" data-action="action_pdf_to_text"><span class="emoji">📄</span> PDF → Text</button>
  <button class="btn" data-action="action_text_to_pdf"><span class="emoji">📄</span> Text → PDF</button>
  <button class="btn" data-action="action_pdf_to_word"><span class="emoji">📄</span> PDF → Word</button>
  <button class="btn" data-action="action_word_to_pdf"><span class="emoji">📄</span> Word → PDF</button>
  <button class="btn" data-action="action_pdf_merge"><span class="emoji">📎</span> Merge PDFs</button>
  <button class="btn" data-action="action_pdf_split"><span class="emoji">✂️</span> Split PDF</button>
  <button class="btn" data-action="action_pdf_add_password"><span class="emoji">🔒</span> PDF Add Password</button>
  <button class="btn" data-action="action_pdf_remove_password"><span class="emoji">🔓</span> PDF Remove Password</button>
</div>

<div class="panel" id="panel-excel">
  <button class="btn" data-action="action_excel_to_csv"><span class="emoji">📊</span> Excel → CSV</button>
  <button class="btn" data-action="action_csv_to_excel"><span class="emoji">📊</span> CSV → Excel</button>
</div>

<div class="panel" id="panel-video">
  <button class="btn" data-action="action_vid_to_audio"><span class="emoji">🎬</span> Video → MP3</button>
  <button class="btn" data-action="action_vid_compress"><span class="emoji">📉</span> Video Compress</button>
</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.ready();
  tg.expand();

  document.querySelectorAll(".tab").forEach(tab => {
    tab.addEventListener("click", () => {
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
      tab.classList.add("active");
      document.getElementById("panel-" + tab.dataset.tab).classList.add("active");
    });
  });

  document.querySelectorAll(".btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const action = btn.dataset.action;
      tg.sendData(JSON.stringify({ action: action }));
      tg.close();
    });
  });
</script>

</body>
</html>
